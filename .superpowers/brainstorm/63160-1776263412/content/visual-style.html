<div class="cards">
  <div class="card" data-choice="ink" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <div style="width:44px;height:44px;border-radius:10px;background:#111;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#F4F1E6;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#5B6B7A;border:1px solid rgba(0,0,0,.08)"></div>
      </div>
      <div style="padding:14px;border-radius:14px;background:linear-gradient(180deg,#F7F3E8 0%,#EFE8D7 100%);border:1px solid rgba(0,0,0,.08)">
        <div style="height:10px;width:46%;background:rgba(17,17,17,.85);border-radius:999px;margin-bottom:10px"></div>
        <div style="height:10px;width:78%;background:rgba(17,17,17,.25);border-radius:999px;margin-bottom:8px"></div>
        <div style="height:10px;width:64%;background:rgba(17,17,17,.18);border-radius:999px"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>水墨 · 留白</h3>
      <p>更克制、更阅读向；强调纸感与留白，适合长文与技术内容。</p>
    </div>
  </div>

  <div class="card" data-choice="vermilion" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <div style="width:44px;height:44px;border-radius:10px;background:#A61B1B;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#F7F0E0;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#C9A227;border:1px solid rgba(0,0,0,.08)"></div>
      </div>
      <div style="padding:14px;border-radius:14px;background:linear-gradient(180deg,#FBF3E2 0%,#F2E6CB 100%);border:1px solid rgba(0,0,0,.08)">
        <div style="height:10px;width:54%;background:rgba(166,27,27,.92);border-radius:999px;margin-bottom:10px"></div>
        <div style="height:10px;width:80%;background:rgba(17,17,17,.22);border-radius:999px;margin-bottom:8px"></div>
        <div style="height:10px;width:66%;background:rgba(17,17,17,.16);border-radius:999px"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>朱砂 · 金线</h3>
      <p>更仪式感、更“传统”；适合故事/随笔，强调点缀、边框与纹样。</p>
    </div>
  </div>

  <div class="card" data-choice="jade" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <div style="width:44px;height:44px;border-radius:10px;background:#2E6B5B;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#F4F6F3;border:1px solid rgba(0,0,0,.08)"></div>
        <div style="width:44px;height:44px;border-radius:10px;background:#8BBFAE;border:1px solid rgba(0,0,0,.08)"></div>
      </div>
      <div style="padding:14px;border-radius:14px;background:linear-gradient(180deg,#F6F8F5 0%,#E7EFE8 100%);border:1px solid rgba(0,0,0,.08)">
        <div style="height:10px;width:52%;background:rgba(46,107,91,.92);border-radius:999px;margin-bottom:10px"></div>
        <div style="height:10px;width:80%;background:rgba(17,17,17,.20);border-radius:999px;margin-bottom:8px"></div>
        <div style="height:10px;width:66%;background:rgba(17,17,17,.14);border-radius:999px"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>青玉 · 清雅</h3>
      <p>更现代、更清爽；用“玉色/青绿”做主色，适配卡片化与组件化。</p>
