<h2>Qing 主题：字体与标题装饰</h2>
<p class="subtitle">已选：水墨留白 + Gemini 双栏 + 点睛色「花青 #2376b7」。接下来定“字的气质”。</p>

<div class="options">
  <div class="option" data-choice="serif" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>书卷宋体</h3>
      <p>正文偏宋体/明朝体风格，标题有细线与小印章点缀。阅读感最强，偏传统。</p>
    </div>
  </div>

  <div class="option" data-choice="wenkai" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>文楷正文</h3>
      <p>正文用文楷（更“手写”），标题更克制；整体更有温度，但长文可能更费眼。</p>
    </div>
  </div>

  <div class="option" data-choice="hybrid" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>现代正文 + 国风标题</h3>
      <p>正文用现代无衬线（更清晰），只在标题/引用/分隔符上做国风装饰。稳、耐看、实现成本低。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle" style="margin-top:14px">你也可以回复“正文无衬线、标题宋体”，我会按最推荐的 C 做一个混搭方案。</p>
</div>
